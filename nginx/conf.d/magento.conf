upstream varnish_backend    { server varnish:6081; keepalive 10; }
upstream php_fpm_backend    { server php-fpm:9000; keepalive 5; }
upstream phpmyadmin_backend { server phpmyadmin:80; keepalive 5; }

server {
    listen 80;
    server_name test.dyna.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name test.dyna.com;

    ssl_certificate     /etc/nginx/ssl/test.dyna.com.crt;
    ssl_certificate_key /etc/nginx/ssl/test.dyna.com.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;

    root /var/www/html/pub;

    location /pub/static/ {
        alias /var/www/html/pub/static/;
        expires max;
        add_header Cache-Control "public";
        access_log off;
    }

    location /pub/media/ {
        alias /var/www/html/pub/media/;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    location /pma/ {
        auth_basic           "Restricted";
        auth_basic_user_file /etc/nginx/auth/.htpasswd;
        proxy_pass         http://phpmyadmin_backend/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
    }

    location / {
        proxy_pass         http://varnish_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Port 443;
        proxy_read_timeout 600s;
        proxy_buffer_size  128k;
        proxy_buffers      4 256k;
    }
}

server {
    listen 8080;
    server_name test.dyna.com;
    root /var/www/html/pub;

    index index.php;

    autoindex off;
    charset off;

    location /static/ {
        expires max;
        add_header Cache-Control "public";
        access_log off;
        location ~ ^/static/version\d*/ {
            rewrite ^/static/version\d*/(.*)$ /static/$1 last;
        }
    }

    location /media/ {
        try_files $uri $uri/ @magento;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location @magento {
        rewrite / /index.php;
    }

    location ~ \.php$ {
        fastcgi_pass         php_fpm_backend;
        fastcgi_index        index.php;
        fastcgi_param        SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param        HTTPS on;
        fastcgi_param        SERVER_PORT 443;
        fastcgi_param        SERVER_NAME test.dyna.com;
        fastcgi_param        HTTP_HOST test.dyna.com;
        fastcgi_read_timeout 600;
        fastcgi_buffer_size  128k;
        fastcgi_buffers      4 256k;
        include              fastcgi_params;
    }

    location ~* \.(jpg|jpeg|gif|png|svg|css|js|ico|woff|woff2|ttf|eot)$ {
        expires    max;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ /\. { deny all; }
    location ~ ^/(\.user\.ini|\.htaccess|\.git) { deny all; }
}
